#
#   smfc-sample8.conf
#   Sample smfc 5.x service configuration
#
#   Multiple fan curves per IPMI zone:
#   - Two CPU fan controller instances with different curves:
#       - CPU:0 controls zone 0 (mid-plane fans) with a conservative curve [55-75C] -> [20-80%]
#       - CPU:1 controls zone 1 (CPU coolers) with an aggressive curve [40-80C] -> [20-100%]
#   - HD fan controller on zone 1 (shared with CPU:1):
#       - [30-46C] temperature interval is mapped to [25-100%] fan rotation level interval
#   - Other fan controllers are disabled


# Ipmi specific parameters.
[Ipmi]
# Path for ipmitool (str, default=/usr/bin/ipmitool)
command=/usr/bin/ipmitool
# Delay time after changing IPMI fan mode (int, seconds, default=10)
fan_mode_delay=10
# Delay time after changing IPMI fan level (int, seconds, default=2)
fan_level_delay=2


# CPU fan controller instance for zone 0 (mid-plane fans, conservative curve).
[CPU:0]
# Fan controller enabled (bool, default=0)
enabled=1
# IPMI zone(s) (comma- or space-separated list of int, default=0)
ipmi_zone=0
# Calculation of CPU temperatures (int, [0-minimum, 1-average, 2-maximum], default=1)
temp_calc=1
# Discrete steps in mapping of temperatures to fan level (int, default=5)
steps=5
# Threshold in temperature change before the fan controller reacts (float, C, default=3.0)
sensitivity=3.0
# Polling time interval for reading temperature (int, sec, default=2)
polling=2
# Minimum CPU temperature (float, C, default=55.0)
min_temp=55.0
# Maximum CPU temperature (float, C, default=75.0)
max_temp=75.0
# Minimum CPU fan level (int, %, default=20)
min_level=20
# Maximum CPU fan level (int, %, default=80)
max_level=80
# Moving average window size for temperature smoothing (int, default=1, 1=disabled)
smoothing=1


# CPU fan controller instance for zone 1 (CPU coolers, aggressive curve).
[CPU:1]
# Fan controller enabled (bool, default=0)
enabled=1
# IPMI zone(s) (comma- or space-separated list of int, default=0)
ipmi_zone=1
# Calculation of CPU temperatures (int, [0-minimum, 1-average, 2-maximum], default=1)
temp_calc=1
# Discrete steps in mapping of temperatures to fan level (int, default=6)
steps=6
# Threshold in temperature change before the fan controller reacts (float, C, default=3.0)
sensitivity=3.0
# Polling time interval for reading temperature (int, sec, default=2)
polling=2
# Minimum CPU temperature (float, C, default=40.0)
min_temp=40.0
# Maximum CPU temperature (float, C, default=80.0)
max_temp=80.0
# Minimum CPU fan level (int, %, default=20)
min_level=20
# Maximum CPU fan level (int, %, default=100)
max_level=100
# Moving average window size for temperature smoothing (int, default=1, 1=disabled)
smoothing=1


# HD fan controller on zone 1 (shared with CPU:1).
[HD]
# Fan controller enabled (bool, default=0)
enabled=1
# IPMI zone(s) (comma- or space-separated list of int, default=1)
ipmi_zone=1
# Calculation of HD temperatures (int, [0-minimum, 1-average, 2-maximum], default=1)
temp_calc=1
# Discrete steps in mapping of temperatures to fan level (int, default=4)
steps=4
# Threshold in temperature change before the fan controller reacts (float, C, default=2.0)
sensitivity=2.0
# Polling time interval for reading temperature (int, sec, default=10)
polling=10
# Minimum HD temperature (float, C, default=30.0)
min_temp=30.0
# Maximum HD temperature (float, C, default=46.0)
max_temp=46.0
# Minimum HD fan level (int, %, default=25)
min_level=25
# Maximum HD fan level (int, %, default=100)
max_level=100
# Moving average window size for temperature smoothing (int, default=1, 1=disabled)
smoothing=1
# HD device names (comma- or space-separated list of str)
hd_names=nvme_names=SPECIFIED_BY_USER
# Path for 'smartctl' command (str, default=/usr/sbin/smartctl)
smartctl_path=/usr/sbin/smartctl
# Standby guard feature enabled (bool, default=0)
standby_guard_enabled=0
# Number of HDs in STANDBY state before the full array goes STANDBY (int, default=1)
standby_hd_limit=1
