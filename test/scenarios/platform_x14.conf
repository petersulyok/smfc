# platform_x14.conf
# Exercises the GenericX14Platform (6 zones, direct-% level encoding,
# raw byte sequence 0x30 0x70 0x88 <zone> <level>; plus 0x2c 0x04 0xcf 0xc2
# OEM commands at startup to enable manual mode per zone).

[Ipmi]
#command=automatically generated
fan_mode_delay=0
fan_level_delay=0
platform_name=generic_x14

[CPU]
enabled=1
ipmi_zone=0
temp_calc=1
sensitivity=5
polling=2
steps=5
min_temp=30
max_temp=60
min_level=35
max_level=100

[HD]
enabled=1
ipmi_zone=1
temp_calc=1
sensitivity=2
polling=5
steps=4
min_temp=32
max_temp=48
min_level=35
max_level=100
#hd_names=automatically generated
#smartctl_path=automatically generated
standby_guard_enabled=0
standby_hd_limit=1

[GPU]
enabled=0

[CONST]
enabled=1
ipmi_zone=5
polling=25
level=50
