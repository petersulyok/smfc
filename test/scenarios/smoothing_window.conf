# smoothing_window.conf
# Exercises the temperature smoothing moving-average window (smoothing > 1).
# Polling is short (1s) and smoothing=5 so the window fills within ~5 seconds
# of the smoke run; the temperature-drift thread feeds varying inputs so the
# moving average actually changes value across cycles.

[Ipmi]
#command=automatically generated
fan_mode_delay=0
fan_level_delay=0

[CPU]
enabled=1
ipmi_zone=0
temp_calc=1
sensitivity=1
polling=1
steps=5
min_temp=30
max_temp=60
min_level=35
max_level=100
smoothing=5

[HD]
enabled=1
ipmi_zone=1
temp_calc=1
sensitivity=1
polling=2
steps=4
min_temp=32
max_temp=48
min_level=35
max_level=100
#hd_names=automatically generated
#smartctl_path=automatically generated
standby_guard_enabled=0
standby_hd_limit=1
smoothing=3

[GPU]
enabled=0

[CONST]
enabled=0
