# no_enforce_fan_mode.conf
# Exercises the BMC fan-mode drift path with enforce_fan_mode disabled.
# Unlike every other scenario, the service should NOT re-assert FULL on drift —
# look for the *absence* of "BMC fan mode drifted ... restoring FULL" log lines.

[Ipmi]
#command=automatically generated
fan_mode_delay=0
fan_level_delay=0
enforce_fan_mode=0

[CPU]
enabled=1
ipmi_zone=0
temp_calc=1
sensitivity=5
polling=2
steps=5
min_temp=30
max_temp=60
min_level=35
max_level=100

[HD]
enabled=1
ipmi_zone=1
temp_calc=1
sensitivity=2
polling=5
steps=4
min_temp=32
max_temp=48
min_level=35
max_level=100
#hd_names=automatically generated
#smartctl_path=automatically generated
standby_guard_enabled=0
standby_hd_limit=1

[GPU]
enabled=0

[CONST]
enabled=0
