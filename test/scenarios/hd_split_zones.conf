# hd_split_zones.conf
# Exercises numbered [HD:N] sections — two HD pools driving two separate
# IPMI zones. Models a JBOD/backplane split where the front pool feeds one
# fan zone and the rear pool feeds another. Each [HD:N] section gets its
# own slice of the generated /dev/sd? names from the smoke runner.

[Ipmi]
#command=automatically generated
fan_mode_delay=0
fan_level_delay=0

[CPU]
enabled=0

[HD:0]
enabled=1
ipmi_zone=0
temp_calc=1
sensitivity=2
polling=3
steps=4
min_temp=32
max_temp=48
min_level=35
max_level=100
#hd_names=automatically generated (front pool)
#smartctl_path=automatically generated
standby_guard_enabled=0
standby_hd_limit=1

[HD:1]
enabled=1
ipmi_zone=1
temp_calc=2
sensitivity=2
polling=3
steps=4
min_temp=32
max_temp=48
min_level=35
max_level=100
#hd_names=automatically generated (rear pool)
#smartctl_path=automatically generated
standby_guard_enabled=0
standby_hd_limit=1

[NVME]
enabled=0

[GPU]
enabled=0

[CONST]
enabled=0
