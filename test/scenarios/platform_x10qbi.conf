# platform_x10qbi.conf
# Exercises the X10QBi platform (Nuvoton NCT7904D; 4 zones, 0-255 level encoding,
# raw byte sequence 0x30 0x91 0x5c 0x03 <reg> <level>; start() runs a 10-line
# TMFR init sequence on each set_fan_level call).

[Ipmi]
#command=automatically generated
fan_mode_delay=0
fan_level_delay=0
platform_name=X10QBi

[CPU]
enabled=1
ipmi_zone=0
temp_calc=1
sensitivity=5
polling=2
steps=5
min_temp=30
max_temp=60
min_level=35
max_level=100

[HD]
enabled=1
ipmi_zone=1
temp_calc=1
sensitivity=2
polling=5
steps=4
min_temp=32
max_temp=48
min_level=35
max_level=100
#hd_names=automatically generated
#smartctl_path=automatically generated
standby_guard_enabled=0
standby_hd_limit=1

[GPU]
enabled=0

[CONST]
enabled=1
ipmi_zone=2
polling=25
level=50
