# control_function.conf
#
# Smoke test config exercising the user-defined control_function= curve on both
# CPU and HD sections. NVME/GPU/CONST stay disabled. Mirrors the layout of
# cpu_2.conf so the run_test_*.sh wrapper can keep the same --cpu-num / --hd-num
# parameters.

[Ipmi]
#command=automatically generated
fan_mode_delay=0
fan_level_delay=0

[CPU]
enabled=1
ipmi_zone=0
temp_calc=1
steps=5
sensitivity=3
polling=2
# 4-point curve: shallow shelf 30..50, steep ramp 50..60, final climb 60..65.
control_function=30-35, 50-40, 60-90, 65-100

[HD]
enabled=1
ipmi_zone=1
temp_calc=1
steps=4
sensitivity=2
polling=5
# 3-point curve: flat 32..38, ramp 38..46.
control_function=32-35, 38-45, 46-100
#hd_names=automatically generated
#smartctl_path=automatically generated
standby_guard_enabled=0
