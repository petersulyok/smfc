name: Build packages

on:
  release:
    types: [published]

jobs:
  build-deb:
    name: Build DEB package
    runs-on: ubuntu-latest
    container: debian:trixie

    steps:
      - uses: actions/checkout@v6
      - name: Install build dependencies
        run: |
          apt-get update
          apt-get install -y build-essential debhelper dh-python pybuild-plugin-pyproject python3-all python3-setuptools python3-build
      - name: Build DEB package
        run: |
          dpkg-buildpackage -us -uc -b
          cp ../smfc_*.deb .
      - name: Get version
        run: echo "VERSION=$(dpkg-parsechangelog -S Version)" >> $GITHUB_ENV
      - name: Upload DEB package
        uses: actions/upload-artifact@v4
        with:
          name: smfc-${{ env.VERSION }}-deb
          path: smfc_*.deb

  build-rpm:
    name: Build RPM package
    runs-on: ubuntu-latest
    container: fedora:latest

    steps:
      - uses: actions/checkout@v6
      - name: Install build dependencies
        run: dnf install -y rpm-build python3-devel python3-setuptools python3-pip python3-wheel pyproject-rpm-macros systemd-rpm-macros
      - name: Get version
        run: echo "VERSION=$(grep '^Version:' smfc.spec | awk '{print $2}')" >> $GITHUB_ENV
      - name: Create source tarball
        run: |
          mkdir -p ~/rpmbuild/SOURCES
          tar czf ~/rpmbuild/SOURCES/smfc-${VERSION}.tar.gz --transform="s,^./,smfc-${VERSION}/," --exclude='.git' --exclude='.venv' .
      - name: Build RPM package
        run: rpmbuild -bb smfc.spec
      - name: Upload RPM package
        uses: actions/upload-artifact@v4
        with:
          name: smfc-${{ env.VERSION }}-rpm
          path: ~/rpmbuild/RPMS/noarch/smfc-*.rpm

  publish:
    name: Publish packages to release and APT repository
    needs: [build-deb, build-rpm]
    runs-on: ubuntu-latest

    steps:
      - name: Download DEB artifact
        uses: actions/download-artifact@v4
        with:
          pattern: smfc-*-deb
          merge-multiple: true

      - name: Download RPM artifact
        uses: actions/download-artifact@v4
        with:
          pattern: smfc-*-rpm
          merge-multiple: true

      - name: Attach packages to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${{ github.event.release.tag_name }}" smfc_*.deb smfc-*.rpm --clobber

      - name: Dispatch to smfc-deb
        env:
          GH_TOKEN: ${{ secrets.PACKAGE_REPO_DISPATCH_TOKEN }}
        run: |
          gh api repos/petersulyok/smfc-deb/dispatches \
            -f event_type=package-published \
            -f "client_payload[release_tag]=${{ github.event.release.tag_name }}"

      # TODO: add `Dispatch to smfc-rpm` step once smfc-rpm repository exists
